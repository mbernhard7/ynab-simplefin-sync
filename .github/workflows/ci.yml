name: CI

# Pushes to main are handled by release.yml, which runs the same tests before
# publishing. Keeping this on PRs only avoids testing every commit twice.
on:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 20
      - run: npm ci
      - run: npm test
      - run: node --test app/smoke.test.mjs
